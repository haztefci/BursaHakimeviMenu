<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Bursa Hakimevi | Ürünler</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
    background:#f5f5f0;
    font-family:'Segoe UI',sans-serif;
}

.header{

    background:#0B2341;
    color:white;
    padding:18px;
    border-radius:0 0 20px 20px;
    box-shadow:0 4px 15px rgba(0,0,0,.2);

}

.header h3{

    margin:0;
    font-weight:bold;

}

.backButton{

    color:white;
    font-size:24px;
    text-decoration:none;

}

.searchBox{

    padding:15px;

}

.form-control{

    border-radius:15px;

}

.productCard{

    background:white;

    border-radius:20px;

    overflow:hidden;

    box-shadow:0 6px 18px rgba(0,0,0,.12);

    margin-bottom:20px;

    transition:.30s;

    cursor:pointer;

}

.productCard:hover{

    transform:translateY(-5px);

}

.productCard img{

    width:100%;

    height:220px;

    object-fit:cover;

}

.productBody{

    padding:18px;

}

.productName{

    font-size:22px;

    font-weight:bold;

    color:#0B2341;

}

.productInfo{

    color:#666;

    margin-top:8px;

}

.price{

    color:#D4AF37;

    font-size:26px;

    font-weight:bold;

}

.badgeChef{

    background:#D4AF37;

    color:white;

    padding:5px 12px;

    border-radius:20px;

    font-size:13px;

}

</style>

</head>

<body>

<div class="header">

<div class="d-flex align-items-center">

<a href="hkategori.html" class="backButton">

<i class="bi bi-arrow-left-circle"></i>

</a>

<div class="ms-3">

<h3 id="kategoriBaslik">

Ürünler

</h3>

</div>

</div>

</div>

<div class="searchBox">

<input
id="arama"
class="form-control"
placeholder="🔍 Ürün Ara">

</div>

<div class="container pb-5">

<div class="row" id="urunListesi">

<!-- JavaScript buraya ürünleri ekleyecek -->

</div>

</div>

<script>

const url = new URLSearchParams(window.location.search);
const kategori = url.get("kategori");

const kategoriBaslik = document.getElementById("kategoriBaslik");
const urunListesi = document.getElementById("urunListesi");
const arama = document.getElementById("arama");

let tumUrunler = [];

const kategoriAdlari = {
    izgara: "🥩 Izgara & Kebap",
    pide: "🍕 Pideler",
    kahvalti: "🍳 Kahvaltı",
    arasicak: "🍲 Ara Sıcaklar",
    corba: "🥣 Çorbalar",
    salata: "🥗 Salatalar",
    tatli: "🍰 Tatlılar",
    icecek: "🥤 İçecekler"
    cerez: "🥜 Kuruyemişler"
};

kategoriBaslik.innerHTML = kategoriAdlari[kategori] || "Menü";

fetch("data/menu.json")
.then(response => response.json())
.then(data=>{

    tumUrunler = data.filter(u=>u.kategori==kategori);

    listele(tumUrunler);

});

function listele(liste){

    urunListesi.innerHTML="";

    if(liste.length==0){

        urunListesi.innerHTML=`

        <div class="col-12">

            <div class="alert alert-warning">

            Bu kategoride ürün bulunamadı.

            </div>

        </div>

        `;

        return;

    }

    liste.forEach(urun=>{

        urunListesi.innerHTML+=`

        <div class="col-xl-3 col-lg-4 col-md-6 col-sm-12 col-12">

            <div class="productCard"

            onclick="detayGit(${urun.id})">

                <img src="${urun.resim}"

                onerror="this.src='images/noimage.jpg'"
                style="width: 100% !important; height: 240px !important; object-fit: contain !important; background-color: #f7f7f7 !important; padding: 10px !important;">

                <div class="productBody">

                    <div class="d-flex justify-content-between">

                        <div class="productName">

                            ${urun.ad}

                        </div>

                        ${urun.sefTavsiyesi ?

                        `<span class="badgeChef">

                        Şefin Tavsiyesi

                        </span>`

                        :``}

                    </div>

                    <div class="productInfo">

                        ${urun.icerik}

                    </div>

                    <div class="productInfo">

                        🔥 ${urun.kalori} kcal

                    </div>

                    <div class="mt-3 d-flex justify-content-between align-items-center">

                        <div class="price">

                            ₺ ${urun.fiyat}

                        </div>

                        <button

                        class="btn btn-outline-primary rounded-pill">

                        Detay

                        </button>

                    </div>

                </div>

            </div>

        </div>

        `;

    });

}

arama.addEventListener("keyup",function(){

    let kelime=this.value.toLowerCase();

    let sonuc=tumUrunler.filter(function(u){

        return u.ad.toLowerCase().includes(kelime)

        ||

        u.icerik.toLowerCase().includes(kelime);

    });

    listele(sonuc);

});

function detayGit(id){

    location.href="hurun.html?id="+id;

}

</script>

</body>

</html>
